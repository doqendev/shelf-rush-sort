<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shelf Rush Sort — a cozy shelf-sorting puzzle.">

  <!--
    Dev-test build: never let a stale service worker serve old code. The app is
    built with --pwa-strategy=none (no new SW), and this script unregisters any
    SW a previous build left behind and clears its caches, then reloads once so
    the visitor always gets the current build. Prevents "the deploy looks
    broken" reports that are really just a cached old bundle.
  -->
  <script>
    if ('serviceWorker' in navigator && !sessionStorage.getItem('sw_cleaned')) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        if (regs.length === 0) { return; }
        // Guard so we reload at most once per tab session (never a loop).
        sessionStorage.setItem('sw_cleaned', '1');
        Promise.all(regs.map(function (r) { return r.unregister(); }))
          .then(function () {
            return (window.caches && caches.keys)
              ? caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) {
                    return caches.delete(k);
                  }));
                })
              : null;
          })
          .then(function () { window.location.reload(); });
      });
    }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="shelf_rush_sort">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>shelf_rush_sort</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
